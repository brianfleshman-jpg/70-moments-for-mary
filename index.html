<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>70 Moments for Mary</title>
  <style>
    /* ============================================================
       BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #fff;
      color: #1d1d1f;
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
    }

    /* ============================================================
       HERO
    ============================================================ */
    .hero {
      text-align: center;
      padding: 80px 24px 60px;
    }

    .hero-inner {
      max-width: 680px;
      margin: 0 auto;
    }

    .hero .number {
      display: block;
      font-size: 96px;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #af52de, #ff2d55, #ff9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 700;
      color: #1d1d1f;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .hero .subtitle {
      font-size: 21px;
      color: #86868b;
      line-height: 1.4;
    }

    /* ============================================================
       CARDS SECTION
    ============================================================ */
    .moments {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 0 48px;
    }

    /* ============================================================
       CARD
    ============================================================ */
    .card {
      background: #f5f5f7;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    /* --- Media (photo / video) --- */
    .card-media {
      width: 100%;
      display: block;
    }

    .card-media img {
      width: 100%;
      display: block;
      object-fit: contain;
      background: #f5f5f7;
    }

    .card-media video {
      width: 100%;
      display: block;
      max-height: 400px;
      background: #000;
    }

    /* --- Body --- */
    .card-body {
      padding: 24px 28px 28px;
    }

    /* Text-only cards get bigger quote treatment */
    .card--text-only .card-body {
      padding: 32px;
    }

    /* Quote text */
    .card-text {
      font-style: italic;
      font-size: 15px;
      line-height: 1.6;
      color: #1d1d1f;
      margin-bottom: 16px;
    }

    .card--text-only .card-text {
      font-size: 21px;
      line-height: 1.5;
    }

    /* Attribution row */
    .card-attribution {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-name {
      font-size: 14px;
      color: #86868b;
      font-weight: 500;
    }

    .card-relationship {
      font-size: 14px;
      color: #86868b;
    }

    .card-label {
      font-size: 12px;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    .footer {
      text-align: center;
      padding: 48px 24px 64px;
      color: #86868b;
      font-size: 14px;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 639px) {
      .hero h1 {
        font-size: 32px;
      }

      .hero .number {
        font-size: 64px;
      }

      .moments {
        padding-left: 16px;
        padding-right: 16px;
      }
    }

    /* ============================================================
       TV MODE
    ============================================================ */
    body.tv-mode {
      background: #000;
      overflow: hidden;
    }

    body.tv-mode .hero,
    body.tv-mode .moments,
    body.tv-mode .footer {
      display: none;
    }

    .tv-slideshow {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body.tv-mode .tv-slideshow {
      display: block;
    }

    /* Start screen */
    .tv-start {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }

    .tv-start .number {
      font-size: 120px;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #af52de, #ff2d55, #ff9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tv-start h1 {
      font-size: 48px;
      font-weight: 600;
      color: #fff;
      margin-top: 8px;
    }

    .tv-start .tap-hint {
      font-size: 17px;
      color: rgba(255,255,255,0.4);
      margin-top: 32px;
    }

    /* Slide container */
    .tv-slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      z-index: 5;
    }

    .tv-slide.active {
      opacity: 1;
    }

    /* Photo slide */
    .tv-slide-photo {
      position: absolute;
      inset: 0;
      object-fit: contain;
      width: 100%;
      height: 100%;
    }

    .tv-slide-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 60px 48px 48px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      z-index: 2;
    }

    .tv-slide-text {
      font-size: 28px;
      font-weight: 400;
      font-style: italic;
      color: #fff;
      line-height: 1.4;
      max-width: 700px;
    }

    .tv-slide-author {
      font-size: 17px;
      color: rgba(255,255,255,0.6);
      margin-top: 12px;
    }

    /* Text-only slide */
    .tv-slide-text-only {
      text-align: center;
      padding: 48px;
      max-width: 800px;
    }

    .tv-slide-text-only .tv-slide-text {
      font-size: 36px;
      max-width: none;
    }

    .tv-slide-text-only .tv-slide-author {
      font-size: 21px;
      margin-top: 24px;
    }

    /* Video slide */
    .tv-slide video {
      max-width: 100%;
      max-height: 100%;
    }

    /* Progress bar */
    .tv-progress {
      position: fixed;
      top: 24px;
      left: 32px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 20;
    }

    /* Pause indicator */
    .tv-paused-indicator {
      position: fixed;
      top: 24px;
      right: 32px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      z-index: 20;
      display: none;
    }

    body.tv-paused .tv-paused-indicator {
      display: block;
    }

    /* Grandkids finale card */
    .tv-slide-finale {
      text-align: center;
    }

    .tv-slide-finale .finale-number {
      font-size: 120px;
      font-weight: 700;
      background: linear-gradient(135deg, #af52de, #ff2d55, #ff9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .tv-slide-finale .finale-text {
      font-size: 36px;
      font-weight: 400;
      color: #fff;
      margin-top: 16px;
    }

    .tv-slide-finale .finale-sub {
      font-size: 21px;
      color: rgba(255,255,255,0.4);
      margin-top: 16px;
    }

  </style>
</head>
<body>

  <!-- ============================================================
       HERO
  ============================================================ -->
  <section class="hero">
    <div class="hero-inner">
      <span class="number">70</span>
      <h1>Moments for Mary</h1>
      <p class="subtitle">A keepsake of love from the people who know her best.</p>
    </div>
  </section>

  <!-- ============================================================
       MOMENTS
  ============================================================ -->
  <main class="moments" id="moments-container">
    <!-- Cards injected by JS -->
  </main>

  <!-- ============================================================
       FOOTER
  ============================================================ -->
  <footer class="footer">
    70 Moments for Mary
  </footer>

  <!-- ============================================================
       TV SLIDESHOW
  ============================================================ -->
  <div class="tv-slideshow">
    <div class="tv-start" id="tv-start">
      <span class="number">70</span>
      <h1>Moments for Mary</h1>
      <p class="tap-hint">Click anywhere to start</p>
    </div>
    <div class="tv-progress" id="tv-progress"></div>
    <div class="tv-paused-indicator">PAUSED</div>
    <div id="tv-slides-container"></div>
  </div>

  <script>
    var isTvMode = new URLSearchParams(window.location.search).get('mode') === 'tv';

    if (isTvMode) {
      document.body.classList.add('tv-mode');
    }

    // ============================================================
    // TV MODE
    // ============================================================
    var tvMoments = [];
    var tvCurrentIndex = 0;
    var tvTimer = null;
    var tvPaused = false;
    var tvStarted = false;
    var SLIDE_DURATION = 12000;

    function buildTvSlide(moment, total) {
      var slide = document.createElement('div');
      slide.className = 'tv-slide';

      var isLast = moment.number === tvMoments[tvMoments.length - 1].number;
      var hasPhoto = moment.photo != null;
      var hasVideo = moment.video != null;

      // Check if this is the grandkids finale (last moment)
      if (isLast && total > 1) {
        slide.classList.add('tv-slide-finale-wrap');
        slide.innerHTML =
          '<div class="tv-slide-finale">' +
            '<div class="finale-number">70</div>' +
            '<div class="finale-text">The grandkids — live</div>' +
            '<div class="finale-sub">This moment belongs to them.</div>' +
          '</div>';
        slide.dataset.finale = 'true';
        return slide;
      }

      if (hasVideo) {
        var video = document.createElement('video');
        video.src = moment.video;
        video.playsInline = true;
        video.preload = 'metadata';
        video.style.maxWidth = '100%';
        video.style.maxHeight = '100%';
        slide.appendChild(video);
        slide.dataset.video = 'true';

        if (moment.text) {
          var overlay = document.createElement('div');
          overlay.className = 'tv-slide-overlay';
          overlay.innerHTML =
            '<div class="tv-slide-text">' + escapeHtml(moment.text) + '</div>' +
            '<div class="tv-slide-author">— ' + escapeHtml(moment.name) + '</div>';
          slide.appendChild(overlay);
        }
      } else if (hasPhoto) {
        var img = document.createElement('img');
        img.className = 'tv-slide-photo';
        img.src = moment.photo;
        img.alt = '';
        slide.appendChild(img);

        var overlay = document.createElement('div');
        overlay.className = 'tv-slide-overlay';
        overlay.innerHTML =
          '<div class="tv-slide-text">' + escapeHtml(moment.text) + '</div>' +
          '<div class="tv-slide-author">— ' + escapeHtml(moment.name) + '</div>';
        slide.appendChild(overlay);
      } else {
        var textWrap = document.createElement('div');
        textWrap.className = 'tv-slide-text-only';
        textWrap.innerHTML =
          '<div class="tv-slide-text">"' + escapeHtml(moment.text) + '"</div>' +
          '<div class="tv-slide-author">— ' + escapeHtml(moment.name) + '</div>';
        slide.appendChild(textWrap);
      }

      return slide;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showTvSlide(index) {
      var container = document.getElementById('tv-slides-container');
      var slides = container.querySelectorAll('.tv-slide');
      slides.forEach(function(s) { s.classList.remove('active'); });

      // Stop any playing videos
      container.querySelectorAll('video').forEach(function(v) {
        v.pause();
        v.currentTime = 0;
      });

      tvCurrentIndex = index;
      var slide = slides[index];
      slide.classList.add('active');

      var progress = document.getElementById('tv-progress');
      progress.textContent = 'Moment ' + tvMoments[index].number + ' of ' + tvMoments[tvMoments.length - 1].number;

      // Clear existing timer
      clearTimeout(tvTimer);

      // Don't auto-advance on finale
      if (slide.dataset.finale === 'true') {
        return;
      }

      // Handle video slides
      if (slide.dataset.video === 'true') {
        var video = slide.querySelector('video');
        video.play().catch(function() {});
        video.onended = function() {
          if (!tvPaused) tvAdvance();
        };
        return;
      }

      // Auto-advance for photo/text slides
      if (!tvPaused) {
        tvTimer = setTimeout(tvAdvance, SLIDE_DURATION);
      }
    }

    function tvAdvance() {
      if (tvCurrentIndex < tvMoments.length - 1) {
        showTvSlide(tvCurrentIndex + 1);
      }
    }

    function tvPrev() {
      if (tvCurrentIndex > 0) {
        showTvSlide(tvCurrentIndex - 1);
      }
    }

    function tvTogglePause() {
      tvPaused = !tvPaused;
      document.body.classList.toggle('tv-paused', tvPaused);
      if (!tvPaused) {
        // Resume — set timer for current slide
        var slide = document.getElementById('tv-slides-container').querySelectorAll('.tv-slide')[tvCurrentIndex];
        if (slide.dataset.finale !== 'true' && slide.dataset.video !== 'true') {
          tvTimer = setTimeout(tvAdvance, SLIDE_DURATION);
        }
      } else {
        clearTimeout(tvTimer);
      }
    }

    function initTvMode(moments) {
      tvMoments = moments;
      var container = document.getElementById('tv-slides-container');

      moments.forEach(function(m) {
        container.appendChild(buildTvSlide(m, moments.length));
      });

      // Start screen click handler
      document.getElementById('tv-start').addEventListener('click', function() {
        this.style.display = 'none';
        tvStarted = true;
        showTvSlide(0);
      });

      // Keyboard controls
      document.addEventListener('keydown', function(e) {
        if (!tvStarted) {
          // Any key starts the show
          document.getElementById('tv-start').style.display = 'none';
          tvStarted = true;
          showTvSlide(0);
          return;
        }

        switch (e.code) {
          case 'Space':
            e.preventDefault();
            tvTogglePause();
            break;
          case 'ArrowRight':
            tvAdvance();
            break;
          case 'ArrowLeft':
            tvPrev();
            break;
          case 'KeyF':
            if (document.fullscreenElement) {
              document.exitFullscreen();
            } else {
              document.documentElement.requestFullscreen();
            }
            break;
        }
      });
    }

    // ============================================================
    // PHONE MODE — Card Builder
    // ============================================================
    function buildCard(moment) {
      const hasPhoto = moment.photo != null;
      const hasVideo = moment.video != null;
      const isTextOnly = !hasPhoto && !hasVideo;

      const card = document.createElement('article');
      card.className = 'card' + (isTextOnly ? ' card--text-only' : '');

      // --- Media ---
      if (hasVideo) {
        const mediaWrap = document.createElement('div');
        mediaWrap.className = 'card-media';
        const video = document.createElement('video');
        video.src = moment.video;
        video.controls = true;
        video.playsInline = true;
        video.preload = 'metadata';
        mediaWrap.appendChild(video);
        card.appendChild(mediaWrap);
      } else if (hasPhoto) {
        const mediaWrap = document.createElement('div');
        mediaWrap.className = 'card-media';
        const img = document.createElement('img');
        img.src = moment.photo;
        img.alt = moment.name;
        img.loading = 'lazy';
        mediaWrap.appendChild(img);
        card.appendChild(mediaWrap);
      }

      // --- Body ---
      const body = document.createElement('div');
      body.className = 'card-body';

      const text = document.createElement('p');
      text.className = 'card-text';
      text.textContent = moment.text;
      body.appendChild(text);

      const attribution = document.createElement('div');
      attribution.className = 'card-attribution';

      const nameRelWrap = document.createElement('span');

      const nameEl = document.createElement('span');
      nameEl.className = 'card-name';
      nameEl.textContent = moment.name;
      nameRelWrap.appendChild(nameEl);

      attribution.appendChild(nameRelWrap);

      const label = document.createElement('span');
      label.className = 'card-label';
      label.textContent = 'Moment ' + moment.number;
      attribution.appendChild(label);

      body.appendChild(attribution);
      card.appendChild(body);

      return card;
    }

    document.addEventListener('DOMContentLoaded', function () {
      fetch('moments.json?v=' + Date.now())
        .then(function (res) {
          if (!res.ok) throw new Error('Failed to load moments.json (' + res.status + ')');
          return res.json();
        })
        .then(function (moments) {
          moments.sort(function (a, b) { return a.number - b.number; });

          if (isTvMode) {
            initTvMode(moments);
          } else {
            var container = document.getElementById('moments-container');
            var fragment = document.createDocumentFragment();
            moments.forEach(function (moment) {
              fragment.appendChild(buildCard(moment));
            });
            container.appendChild(fragment);
          }
        })
        .catch(function (err) {
          console.error(err);
          if (!isTvMode) {
            var container = document.getElementById('moments-container');
            var msg = document.createElement('p');
            msg.style.textAlign = 'center';
            msg.style.color = '#86868b';
            msg.style.padding = '48px 24px';
            msg.textContent = 'Moments are on their way…';
            container.appendChild(msg);
          }
        });
    });
  </script>

</body>
</html>
